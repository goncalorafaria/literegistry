configurations:
  # Use wildcard to match ALL 4-GPU machines (a40-4, l40-4, l40s-4)
  - device_name: "*-8"
    target_instances: 2
    inline_config:
      name: "llama3-8b"
      script_type: vllm
      args:
        model: "meta-llama/Llama-3.1-8B-Instruct"
        tensor_parallel_size: ${DEVICE_COUNT}
        gpu_memory_utilization: 0.95
        max-model-len: 4096
        dtype: bfloat16
      launcher: literegistry
  
  # Use wildcard to match all 8-GPU l40 variants (l40-8, l40s-8)
  - device_name: "*-1"
    target_instances: 8
    inline_config:
      name: "skywork-reward-8b"
      script_type: vllm
      args:
        model: 'Skywork/Skywork-Reward-Llama-3.1-8B-v0.2'
        tensor_parallel_size: ${DEVICE_COUNT}
        gpu_memory_utilization: 0.95
        max-model-len: 4096
        dtype: bfloat16
        task: 'classify'
      launcher: literegistry
