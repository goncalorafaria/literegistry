site_name: LiteRegistry
site_description: Lightweight service registry and discovery for distributed model inference
site_url: https://goncalorafaria.github.io/literegistry/
repo_url: https://github.com/goncalorafaria/literegistry
repo_name: goncalorafaria/literegistry
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: README.md
  - CLI: cli.md
  - Registry: registry.md
  - Gateway: gateway.md
  - vLLM & SGLang: vllm-sglang.md
  - Code & Terminal: code-and-terminal.md
  - Load balancing: load-balancing.md
  - Runtimes: runtimes.md
  - Console: console.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/goncalorafaria/literegistry
